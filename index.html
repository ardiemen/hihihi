<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Morning Salma</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#fff1c9,#ffdfe8,#f2e7ff);
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.8);
      backdrop-filter:blur(10px);
      border-radius:28px;
      padding:38px 30px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      animation:fade 1s ease;
    }

    .sun{
      width:80px;
      height:80px;
      background:#ffd45f;
      border-radius:50%;
      margin:0 auto 22px;
      box-shadow:0 0 35px rgba(255,212,95,0.7);
    }

    h1{
      color:#444;
      font-size:30px;
      margin-bottom:18px;
    }

    p{
      color:#666;
      font-size:15.5px;
      line-height:1.8;
    }

    .highlight{
      color:#ff7899;
      font-weight:600;
    }

    .footer{
      margin-top:22px;
      font-size:13px;
      color:#999;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="sun"></div>

    <h1>Selamat Pagi ☀️</h1>

    <p>
      Semangat ya hari ini, Salma.
      Semoga semuanya lancar,
      dimudahkan segala urusannya,
      dan jangan lupa sarapan 😄
    </p>

    <p style="margin-top:12px;">
      jangan lupa es yang kemaren dibawa yaa wkwk
    </p>

    <div class="footer">
      jum'at berkah, have a nice day ✨
    </div>

  </div>

</body>
</html>
