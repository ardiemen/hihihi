<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Rainy Mood</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to bottom,#4b5d7a,#6f86a6,#9db4d3);
      position:relative;
    }

    /* Rain */
    .rain{
      position:absolute;
      width:2px;
      height:90px;
      background:rgba(255,255,255,0.3);
      animation:rain 0.8s linear infinite;
    }

    .rain:nth-child(1){left:10%; animation-delay:0s;}
    .rain:nth-child(2){left:20%; animation-delay:0.2s;}
    .rain:nth-child(3){left:35%; animation-delay:0.4s;}
    .rain:nth-child(4){left:50%; animation-delay:0.1s;}
    .rain:nth-child(5){left:65%; animation-delay:0.5s;}
    .rain:nth-child(6){left:80%; animation-delay:0.3s;}
    .rain:nth-child(7){left:90%; animation-delay:0.6s;}

    @keyframes rain{
      from{
        top:-100px;
      }
      to{
        top:110%;
      }
    }

    /* Cloud */
    .cloud{
      position:absolute;
      top:70px;
      width:180px;
      height:70px;
      background:#dde6f3;
      border-radius:60px;
      opacity:0.9;
    }

    .cloud::before,
    .cloud::after{
      content:'';
      position:absolute;
      background:#dde6f3;
      border-radius:50%;
    }

    .cloud::before{
      width:80px;
      height:80px;
      top:-35px;
      left:20px;
    }

    .cloud::after{
      width:100px;
      height:100px;
      top:-45px;
      right:20px;
    }

    .c1{
      left:8%;
    }

    .c2{
      right:8%;
      transform:scale(0.8);
    }

    /* Card */
    .card{
      width:90%;
      max-width:430px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter:blur(14px);
      border-radius:28px;
      padding:38px 30px;
      text-align:center;
      color:white;
      z-index:2;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      animation:fade 1s ease;
    }

    h1{
      font-size:30px;
      margin-bottom:18px;
      font-weight:600;
    }

    p{
      font-size:15.5px;
      line-height:1.9;
      color:#f3f3f3;
    }

    .highlight{
      color:#ffd6e0;
      font-weight:600;
    }

    .footer{
      margin-top:22px;
      font-size:13px;
      color:#d8d8d8;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:480px){

      h1{
        font-size:26px;
      }

      p{
        font-size:15px;
      }

      .card{
        padding:34px 24px;
      }

      .cloud{
        width:130px;
        height:55px;
      }
    }

  </style>
</head>
<body>

  <!-- Rain -->
  <div class="rain"></div>
  <div class="rain"></div>
  <div class="rain"></div>
  <div class="rain"></div>
  <div class="rain"></div>
  <div class="rain"></div>
  <div class="rain"></div>

  <!-- Clouds -->
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>

  <!-- Card -->
  <div class="card">

    <h1>Gatau ngasi judul apa wkwk ☔</h1>

    <p>
      Gatau kenapa,
      perasaannya agak aneh kemaren.
      Kaya ada sedikit <span class="highlight">cemb***</span>,
      padahal sadar...
      bukan siapa-siapa wkwk 😅
    </p>

    <p style="margin-top:14px;">
      Tapi yaudahlah,
      mungkin cuma takut
      ada orang lain yang bisa
      bikin kamu senyum lebih sering aja.
    </p>

    <div class="footer">
       cuman nanya doang loh hehe 😅
    </div>

  </div>

</body>
</html>
