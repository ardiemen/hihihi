<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Monday Morning</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:linear-gradient(180deg,#fdf6f0,#f6f0ff,#eef7ff);
      position:relative;
    }

    /* Bubble background */
    .bubble{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.45);
      backdrop-filter:blur(4px);
    }

    .b1{
      width:220px;
      height:220px;
      top:-60px;
      left:-60px;
    }

    .b2{
      width:160px;
      height:160px;
      bottom:40px;
      right:-40px;
    }

    .b3{
      width:90px;
      height:90px;
      top:140px;
      right:120px;
    }

    /* Card */
    .card{
      width:90%;
      max-width:430px;
      background:rgba(255,255,255,0.72);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.4);
      border-radius:30px;
      padding:40px 30px;
      text-align:center;
      box-shadow:0 12px 35px rgba(0,0,0,0.08);
      z-index:2;
      animation:fade 1s ease;
    }

    .emoji{
      font-size:58px;
      margin-bottom:18px;
    }

    h1{
      color:#4f4f4f;
      font-size:30px;
      margin-bottom:18px;
      font-weight:600;
    }

    p{
      color:#666;
      font-size:15.5px;
      line-height:1.8;
    }

    .highlight{
      color:#ff8fab;
      font-weight:600;
    }

    .footer{
      margin-top:22px;
      font-size:13px;
      color:#9a9a9a;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:480px){
      h1{
        font-size:26px;
      }

      p{
        font-size:15px;
      }

      .card{
        padding:34px 24px;
      }
    }

  </style>
</head>
<body>

  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>

  <div class="card">

    <div class="emoji">☁️</div>

    <h1>Happy Monday, Salma ✨</h1>

    <p>
      Hari Senin nih,
      semangat buat kerja dan aktivitas hari ini yaa.
      Semoga semuanya <span class="highlight">lancar</span>,
      mood-nya bagus,
      dan harinya penuh hal baik ☀️
    </p>

    <p style="margin-top:14px;">
      Jangan terlalu capek juga,
      nanti Seninnya baru mulai
      tapi energinya udah tinggal 2% 😭
    </p>

    <div class="footer">
      semangat menjalani hari kerja 😁😁
    </div>

  </div>

</body>
</html>
